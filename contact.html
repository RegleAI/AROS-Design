<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Studio AROS</title>
    <link rel="icon" type="image/png" href="Logos/FAV Icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=2">
    <style>
        /* ===== CONTACT PAGE ===== */
        html, body {
            overflow: hidden;
            height: 100vh;
        }

        .contact-page {
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
        }

        /* Left Side - Form */
        .contact-form-section {
            background: var(--color-primary-dark);
            padding: calc(var(--nav-height) + var(--spacing-md)) var(--spacing-lg) var(--spacing-md);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }

        .contact-form-wrapper {
            max-width: 480px;
            width: 100%;
        }

        .contact-form-wrapper h1 {
            color: var(--color-white);
            margin-bottom: var(--spacing-xs);
            font-size: clamp(1.5rem, 3vw, 2rem);
        }

        .contact-form-wrapper .intro {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: var(--spacing-md);
            font-size: 0.9rem;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .form-group label {
            color: var(--color-white);
            font-size: 0.8rem;
            margin-bottom: 0.25rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.5rem 0.75rem;
            font-size: 0.85rem;
        }

        .form-group textarea {
            min-height: 60px;
        }

        .form-submit-wrapper {
            margin-top: 0.5rem;
        }

        .form-submit-wrapper .btn {
            width: 100%;
            padding: 0.8rem 2rem;
        }

        /* Right Side - Image */
        .contact-image-section {
            overflow: hidden;
            position: relative;
        }

        .contact-image-section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (max-width: 1024px) {
            html, body {
                overflow: auto;
                height: auto;
            }

            .contact-page {
                grid-template-columns: 1fr;
                height: auto;
                min-height: 100vh;
                overflow: auto;
            }

            .contact-form-section,
            .contact-info-section {
                padding: calc(var(--nav-height) + var(--spacing-md)) var(--spacing-md) var(--spacing-md);
                overflow: auto;
            }
        }

        /* ===== SUCCESS MESSAGE ===== */
        .form-success {
            display: none;
            text-align: center;
            padding: var(--spacing-xl);
        }

        .form-success.active {
            display: block;
        }

        .form-success svg {
            width: 80px;
            height: 80px;
            stroke: var(--color-accent);
            fill: none;
            stroke-width: 1.5;
            margin-bottom: var(--spacing-md);
        }

        .form-success h3 {
            color: var(--color-white);
            margin-bottom: var(--spacing-sm);
        }

        .form-success p {
            color: rgba(255, 255, 255, 0.7);
        }

        .contact-form.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- NAVIGATION -->
    <nav class="nav nav-dark" id="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo-link">
                <img src="Logos/White The Aros.png" alt="Studio AROS" class="nav-logo nav-logo-light">
                <img src="Logos/AROS Design Logo.svg?v=2" alt="Studio AROS" class="nav-logo nav-logo-dark">
            </a>
            <div class="nav-toggle" id="navToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="services.html">Services</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="contact.html" class="nav-cta">Get a Quote</a></li>
            </ul>
        </div>
    </nav>

    <!-- CONTACT PAGE -->
    <main class="contact-page">
        <!-- Form Section -->
        <section class="contact-form-section">
            <div class="contact-form-wrapper fade-in">
                <span class="label" style="color: var(--color-accent); margin-bottom: var(--spacing-md); display: block;">Get in Touch</span>
                <h1>Start Your Project</h1>
                <p class="intro">Ready to discuss your project? Fill in the form below and we'll be in touch within 24 hours.</p>

                <form class="contact-form" id="contactForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" name="firstName" placeholder="John" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" name="lastName" placeholder="Smith" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="+44 (0) 1234 567 890">
                    </div>
                    <div class="form-group">
                        <label for="location">Project Location</label>
                        <input type="text" id="location" name="location" placeholder="London">
                    </div>
                    <div class="form-group">
                        <label for="message">Tell Us About Your Project</label>
                        <textarea id="message" name="message" placeholder="Please provide a brief overview of your project, including any specific requirements or timelines..." required></textarea>
                    </div>
                    <div class="form-submit-wrapper">
                        <button type="submit" class="btn btn-primary btn-large">Send Message</button>
                    </div>
                </form>

                <div class="form-success" id="formSuccess">
                    <svg viewBox="0 0 80 80">
                        <circle cx="40" cy="40" r="35"/>
                        <path d="M25 40l10 10 20-20"/>
                    </svg>
                    <h3>Message Sent</h3>
                    <p>Thank you for getting in touch. We'll respond within 24 hours.</p>
                </div>
            </div>
        </section>

        <!-- Image Section -->
        <section class="contact-image-section">
            <img src="Photos_Optimized/RGM/FH_LurotBrand_6RussellGardensMews_TypRes-28.jpg" alt="Studio AROS">
        </section>
    </main>

    <!-- JAVASCRIPT -->
    <script>
        // Navigation
        const navToggle = document.getElementById('navToggle');
        const navLinks = document.getElementById('navLinks');

        navToggle.addEventListener('click', () => {
            navToggle.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                navToggle.classList.remove('active');
                navLinks.classList.remove('active');
            });
        });

        // Form handling
        const contactForm = document.getElementById('contactForm');
        const formSuccess = document.getElementById('formSuccess');

        contactForm.addEventListener('submit', (e) => {
            e.preventDefault();
            // In production, this would send to a server
            contactForm.classList.add('hidden');
            formSuccess.classList.add('active');
        });

        // Animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    </script>
</body>
</html>
